            <li><a href="contact.html" style="font-weight: bold; color: #f48fb1;">Contact</a></li>
        </ul>
    </nav>
    <header class="hero-split">
        <div class="hero-left">
            <div class="contact-info">
                <h1>Get in Touch</h1>
                <p>I'm available for freelance work or full-time positions. Let's build something amazing together!</p>
                
                <div class="contact-details">
                    <div class="detail-item">
                        <strong>Email:</strong>
                        <p>framennas@gmail.com</p>
                    </div>
                    <div class="detail-item">
                        <strong>Cellphone:</strong>
                        <p>+264 817017152</p> </div>
                    <div class="detail-item">
                        <strong>Location:</strong>
                        <p>Windhoek, Namibia</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="hero-right">
            <form action="https://formspree.io/f/xwvnqdop" method="POST" class="contact-form" autocomplete="off">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" placeholder="Enter your name" required autocomplete="off">
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="_replyto" placeholder="Enter your email" required autocomplete="off">
                </div>

                <div class="form-group">
                    <label>Message</label>
                    <textarea name="message" rows="5" placeholder="How can I help you?" required autocomplete="off"></textarea>
                </div>

                <button type="submit" class="btn btn-dark w-100">Send Message</button>
            </form>
        </div>
    </header>
